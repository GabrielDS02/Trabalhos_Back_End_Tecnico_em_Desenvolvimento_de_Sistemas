<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot da Enfermagem</title>

<style>
/* ========= GLOBAL ========= */
body {
    font-family: "Poppins", sans-serif;
    background: radial-gradient(circle, #0a0f1a 0%, #000000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    color: #fff;
}

/* ========= CHAT CONTAINER ========= */
.chat-container {
    width: 430px;
    height: 620px;
    background: rgba(20, 30, 50, 0.55);
    backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    position: relative;
    border: 2px solid rgba(0,255,255,0.2);
    box-shadow: 0 0 25px rgba(0,255,255,0.25);
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

.header {
    text-align: center;
    padding: 10px;
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(90deg, #00eaff, #0077ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ========= CHAT AREA ========= */
#chat {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    padding: 10px;
}

#chat::-webkit-scrollbar {
    width: 6px;
}
#chat::-webkit-scrollbar-thumb {
    background: #00aaff;
    border-radius: 4px;
}

/* Loading bot (digitando) */
.digitando {
    width: 45px;
    height: 18px;
    padding: 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 50px;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: 45px;
    animation: aparece .2s ease;
}

.digitando .dot {
    width: 7px;
    height: 7px;
    background: #00eaff;
    border-radius: 50%;
    animation: bounce 1s infinite;
}
.digitando .dot:nth-child(2){ animation-delay: .15s; }
.digitando .dot:nth-child(3){ animation-delay: .3s; }

@keyframes bounce {
 0%, 80%, 100% { transform: scale(0.6); }
 40% { transform: scale(1); }
}

/* ========= MENSAGENS ========= */
.msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 20px;
    font-size: 15px;
    margin: 10px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    animation: slideIn .35s ease forwards;
    opacity: 0;
}

@keyframes slideIn {
    0% { opacity: 0; transform: translateY(10px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Avatares */
.avatar {
    width: 33px;
    height: 33px;
    border-radius: 50%;
    object-fit: cover;
}

/* Bot */
.bot {
    background: rgba(255,255,255,0.06);
    border-left: 3px solid #00eaff;
    border-bottom-left-radius: 5px;
    margin-right: auto;
}

/* User */
.user {
    background: #006aff;
    border-bottom-right-radius: 5px;
    box-shadow: 0 0 12px rgba(0,140,255,0.4);
    margin-left: auto;
}

/* ========= INPUT AREA ========= */
.input-area {
    display: flex;
    gap: 8px;
    align-items: center;
}

/* CAIXA DE TEXTO */
input {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #0c1624;
    color: #ffffff;
    font-size: 15px;
    box-shadow: inset 0 0 10px rgba(0,255,255,0.15);
}

/* BOTÕES */
.btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    transition: .25s;
    font-size: 18px;
}

.btn-enviar {
    background: #00c3ff;
}
.btn-enviar:hover {
    transform: scale(1.12);
}

/* voz */
.btn-voice {
    background: #0090ff;
}
.btn-voice.recording {
    background: #ff0033;
    animation: pulse .9s infinite;
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
}

/* imagem */
.btn-img {
    background: #0061ff;
}
</style>

</head>
<body>

<div class="chat-container">
    <div class="header">🤖 Chatbot da Enfermagem</div>

    <div id="chat"></div>

    <div id="digitando" class="digitando" style="display:none;">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="input-area">
        <button class="btn btn-img">📎</button>
        <input id="campoMensagem" placeholder="Digite sua mensagem...">
        <button class="btn btn-voice" onclick="speechToText()">🎤</button>
        <button class="btn btn-enviar" onclick="enviarMensagem()">➤</button>
    </div>

</div>

<script src="chat.js"></script>
</body>
</html>
